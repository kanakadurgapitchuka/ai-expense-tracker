{% extends "base.html" %}
{% block content %}

<div class="glass-card">
    <h2>Update Expense</h2>

    <form method="POST">

        <label>Date</label>
        <input type="date" 
               name="date" 
               value="{{ expense.date }}" 
               required>

        <label>Category</label>
        <input type="text" 
               name="category" 
               value="{{ expense.category }}" 
               required>

        <label>Amount</label>
        <input type="number" 
               step="0.01"
               name="amount" 
               value="{{ expense.amount }}" 
               required>

        <button class="login-btn" type="submit">
            Update Expense
        </button>

    </form>

    <br>
    <a href="/dashboard">⬅ Back to Dashboard</a>

</div>

{% endblock %}
