<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
 
    <title>{% block title %}Expense Tracker{% endblock %}</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>

    <!-- Main CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>
    <!-- ================= NAVBAR ================= -->

   <header class="navbar">
    <div class="logo">
        <i class="fa-solid fa-coins"></i> Expense Tracker
    </div>

    <nav class="nav-links">
        <a href="/"><i class="fa-solid fa-house"></i> Home</a>
        <a href="/about"><i class="fa-solid fa-circle-info"></i> About</a>

        {% if session.get("user_id") %}
            <a href="/dashboard"><i class="fa-solid fa-chart-line"></i> Dashboard</a>
            <a href="/logout"><i class="fa-solid fa-right-from-bracket"></i> Logout</a>
        {% else %}
            <a href="/login"><i class="fa-solid fa-right-to-bracket"></i> Login</a>
            <a href="/register"><i class="fa-solid fa-user-plus"></i> Register</a>
        {% endif %}
    </nav>
</header>

    <!-- ================= PAGE CONTENT ================= -->
    <main>
        {% block content %}{% endblock %}
    </main>

    <!-- 🔥 SweetAlert2 CDN (NEW ADDITION ONLY) -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

</body>
</html>
